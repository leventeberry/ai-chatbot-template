services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY}
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL}
    ports:
      - "3001:3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: http://api:3000
    depends_on:
      - api
    ports:
      - "3000:3000"
